name: Feature request
description: Suggest an idea for Cinder.
labels: ['enhancement', 'triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What are you trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
